server.port=8080

# DataSource — uses Replit PG env vars (also works with any Postgres)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}?sslmode=require
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:SISSecretKey2024ForJWTTokenSigningThatIsLongEnough123456789}
jwt.expiration.ms=86400000

# CORS — allow the frontend origin (set CORS_ALLOWED_ORIGINS env var in production)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Logging
logging.level.com.sis=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
